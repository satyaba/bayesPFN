bayespfn_v1:
  model:
    n_features: 32
    d_model: 128
    n_heads: 4
    n_layers: 3
    n_classes: 2
    d_ff: 512
    dropout: 0.1
    max_seq_length: 5000

  training:
    learning_rate: 1.0e-4
    weight_decay: 0.01
    warmup_steps: 500
    batch_size: 8
    num_epochs: 10
    log_interval: 10
    save_interval: 5000

  data:
    n_features: 32
    n_samples_range: [500, 2000]
    n_classes: 2
    feature_interaction_degree: 2

    # Imbalance stratified sampling (Option C)
    imbalance:
      zone_a_ratio: [1.0, 5.0]
      zone_b_ratio: [5.0, 10.0]
      zone_c_ratio: [10.0, 100.0]
      zone_proportions: [0.60, 0.10, 0.30]
      power_law_exponent: 1.5

    # Scaling schedule
    scaling:
      sanity_check: 500
      small_run: 2500
      full_run: 25000

  evaluation:
    n_splits: 5
    test_size: 0.2
    benchmark_datasets:
      - name: creditcard_fraud
        openml_id: 1597
      - name: mammography
        openml_id: 43893
      - name: yeast
        openml_id: 181
